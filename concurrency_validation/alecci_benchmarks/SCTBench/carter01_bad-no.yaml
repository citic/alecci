# SCTBench benchmark: concurrent-software-benchmarks/carter01_bad.c
# Two thread classes share a coarse mutex m and a resource lock l.
# When both classes increment their counters to 1 concurrently, t1 holds l and
# waits for m (second critical section) while t2 holds m and waits for l.
# TSan observes both m->l and l->m edges and reports a lock-order inversion.
# Expected: deadlock warning from TSan.
expected_issues:
  - bug
